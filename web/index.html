<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭健康预警系统 - 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .navbar h1 {
            color: #2c3e50;
            font-size: 2em;
        }
        
        .navbar-buttons {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: #764ba2;
        }
        
        .nav-btn.active {
            background: #764ba2;
        }
        
        /* 内容区域 */
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        /* API配置 */
        .api-config {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .api-config label {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .api-config input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
        }
        
        /* 模型选择器 */
        .model-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .model-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .model-card:hover {
            background: #e3f2fd;
            border-color: #2196f3;
        }
        
        .model-card.selected {
            background: #e3f2fd;
            border-color: #2196f3;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }
        
        .model-id {
            font-weight: bold;
            color: #2196f3;
            margin-bottom: 5px;
        }
        
        .model-name {
            color: #2c3e50;
            font-size: 14px;
        }
        
        .model-type {
            color: #7f8c8d;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* 输入区域 */
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .input-field {
            margin-bottom: 15px;
        }
        
        .input-field label {
            display: block;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .input-field input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .input-field input:focus {
            outline: none;
            border-color: #2196f3;
        }
        
        /* 按钮 */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .generate-btn:active {
            transform: translateY(0);
        }
        
        /* 结果区域 */
        .result-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        .result-section h3 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        .warning-level {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .level-S {
            background: #e74c3c;
            color: white;
        }
        
        .level-A {
            background: #f39c12;
            color: white;
        }
        
        .level-B {
            background: #27ae60;
            color: white;
        }
        
        .level-C {
            background: #95a5a6;
            color: white;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 5px;
        }
        
        .result-item strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }
        
        .result-item p {
            color: #7f8c8d;
            line-height: 1.6;
        }
        
        /* 历史记录表格 */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .history-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        .history-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .history-table tr:hover {
            background: #f8f9fa;
        }
        
        /* 图表区域 */
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .chart-title {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        /* 加载状态 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #7f8c8d;
            margin-top: 10px;
        }
        
        footer {
            text-align: center;
            color: #7f8c8d;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        /* 用户档案 */
        .user-profile {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .profile-item {
            margin-bottom: 15px;
        }
        
        .profile-label {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .profile-value {
            color: #2c3e50;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h1>🥔 家庭健康预警系统</h1>
            <div class="navbar-buttons">
                <button class="nav-btn active" onclick="showSection('warning')">预警生成</button>
                <button class="nav-btn" onclick="showSection('history')">历史记录</button>
                <button class="nav-btn" onclick="showSection('analytics')">数据分析</button>
                <button class="nav-btn" onclick="showSection('profile')">健康档案</button>
            </div>
        </div>
        
        <!-- API配置 -->
        <div class="api-config">
            <label>API服务地址：</label>
            <input type="text" id="apiUrl" value="http://localhost:8001" placeholder="输入API地址">
        </div>
        
        <!-- 预警生成区域 -->
        <div id="warning" class="content-section active">
            <h3>选择预警模型：</h3>
            <div class="model-selector" id="modelSelector"></div>
            
            <div class="input-section">
                <h3>输入健康数据：</h3>
                <div class="input-group" id="inputFields"></div>
            </div>
            
            <button class="generate-btn" onclick="generateWarning()">生成预警</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在生成预警...</p>
            </div>
            
            <div class="result-section" id="resultSection" style="display: none;">
                <h3>预警结果：</h3>
                <div id="warningResult"></div>
            </div>
        </div>
        
        <!-- 历史记录区域 -->
        <div id="history" class="content-section">
            <h3>预警历史记录</h3>
            <button class="generate-btn" style="width: 200px; margin-bottom: 20px;" onclick="loadWarningHistory()">刷新历史</button>
            
            <div class="stats-grid" id="historyStats"></div>
            
            <table class="history-table" id="historyTable">
                <thead>
                    <tr>
                        <th>预警时间</th>
                        <th>预警等级</th>
                        <th>预警类型</th>
                        <th>验证状态</th>
                        <th>评分</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
        
        <!-- 数据分析区域 -->
        <div id="analytics" class="content-section">
            <h3>健康趋势分析</h3>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="avgSbp">--</div>
                    <div class="stat-label">平均收缩压</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgDbp">--</div>
                    <div class="stat-label">平均舒张压</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgGlucose">--</div>
                    <div class="stat-label">平均血糖</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="warningCount">--</div>
                    <div class="stat-label">预警次数</div>
                </div>
            </div>
            
            <button class="generate-btn" style="width: 200px;" onclick="loadAnalytics()">刷新分析</button>
            
            <div class="chart-container">
                <div class="chart-title">预警等级分布</div>
                <div id="warningChart"></div>
            </div>
        </div>
        
        <!-- 健康档案区域 -->
        <div id="profile" class="content-section">
            <h3>用户健康档案</h3>
            
            <div class="user-profile" id="userProfile">
                <div class="profile-item">
                    <div class="profile-label">用户ID</div>
                    <div class="profile-value" id="profileUserId">web_user</div>
                </div>
                <div class="profile-item">
                    <div class="profile-label">健康状态</div>
                    <div class="profile-value" id="profileHealthStatus">未知</div>
                </div>
                <div class="profile-item">
                    <div class="profile-label">预警统计</div>
                    <div class="profile-value" id="profileWarningStats">无记录</div>
                </div>
            </div>
            
            <button class="generate-btn" style="width: 200px;" onclick="loadUserProfile()">刷新档案</button>
        </div>
        
        <footer>
            <p>© 2026 家庭健康预警系统 | 匠心Agent + 磐石Agent + 天工Agent + 明镜Agent</p>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // 模型数据
        const models = [
            {id: "01", name: "血压预警", type: "单项预警"},
            {id: "02", name: "脉压差预警", type: "单项预警"},
            {id: "03", name: "晨峰高血压预警", type: "单项预警"},
            {id: "04", name: "心电预警", type: "单项预警"},
            {id: "05", name: "血氧预警", type: "单项预警"},
            {id: "06", name: "HRV预警", type: "单项预警"},
            {id: "07", name: "血糖预警", type: "单项预警"},
            {id: "08", name: "血酮预警", type: "单项预警"},
            {id: "09", name: "尿酸预警", type: "单项预警"},
            {id: "10", name: "体温预警", type: "单项预警"},
            {id: "11", name: "体重预警", type: "单项预警"},
            {id: "12", name: "酮症酸中毒联合预警", type: "联合预警"},
            {id: "13", name: "脑卒中风险联合预警", type: "联合预警"},
            {id: "14", name: "心梗风险联合预警", type: "联合预警"},
            {id: "15", name: "睡眠呼吸暂停联合预警", type: "联合预警"},
            {id: "16", name: "代谢综合征联合预警", type: "联合预警"},
            {id: "17", name: "呼吸衰竭风险联合预警", type: "联合预警"},
            {id: "18", name: "心力衰竭风险联合预警", type: "联合预警"},
            {id: "19", name: "低血糖昏迷风险联合预警", type: "联合预警"},
            {id: "20", name: "高渗高血糖状态预警", type: "联合预警"},
            {id: "21", name: "脓毒症风险联合预警", type: "联合预警"},
            {id: "22", name: "心律失常猝死风险预警", type: "联合预警"},
            {id: "23", name: "痛风风险联合预警", type: "联合预警"},
            {id: "24", name: "脑卒中风险专项预警", type: "专项预警"},
            {id: "25", name: "心梗风险专项预警", type: "专项预警"}
        ];
        
        // 模型输入字段
        const modelInputs = {
            "12": [
                {name: "glucose_value", label: "血糖值（mmol/L）", type: "number", default: "15.0"},
                {name: "ketone_value", label: "血酮值（mmol/L）", type: "number", default: "3.5"}
            ],
            "04": [
                {name: "rhythm_type", label: "心律类型", type: "text", default: "房颤"},
                {name: "heart_rate", label: "心率（次/分）", type: "number", default: "110"},
                {name: "arrhythmia_count", label: "心律失常次数", type: "number", default: "5"}
            ],
            "16": [
                {name: "sbp_value", label: "收缩压（mmHg）", type: "number", default: "135"},
                {name: "dbp_value", label: "舒张压（mmHg）", type: "number", default: "88"},
                {name: "fbg_value", label: "空腹血糖（mmol/L）", type: "number", default: "5.8"},
                {name: "bmi_value", label: "BMI", type: "number", default: "26.5"},
                {name: "tg_value", label: "甘油三酯（mmol/L）", type: "number", default: "1.8"},
                {name: "hdl_value", label: "HDL胆固醇（mmol/L）", type: "number", default: "1.0"}
            ]
        };
        
        let selectedModel = "12";
        let warningHistory = [];
        let healthRecords = [];
        
        // 初始化模型选择器
        function initModelSelector() {
            const selector = document.getElementById('modelSelector');
            models.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.dataset.id = model.id;
                if (model.id === selectedModel) {
                    card.classList.add('selected');
                }
                card.innerHTML = `
                    <div class="model-id">模型${model.id}</div>
                    <div class="model-name">${model.name}</div>
                    <div class="model-type">${model.type}</div>
                `;
                card.onclick = () => selectModel(model.id);
                selector.appendChild(card);
            });
        }
        
        // 选择模型
        function selectModel(modelId) {
            selectedModel = modelId;
            document.querySelectorAll('.model-card').forEach(card => {
                card.classList.remove('selected');
                if (card.dataset.id === modelId) {
                    card.classList.add('selected');
                }
            });
            updateInputFields();
        }
        
        // 更新输入字段
        function updateInputFields() {
            const inputGroup = document.getElementById('inputFields');
            inputGroup.innerHTML = '';
            
            const inputs = modelInputs[selectedModel] || [
                {name: "value", label: "数值", type: "number", default: ""}
            ];
            
            inputs.forEach(input => {
                const field = document.createElement('div');
                field.className = 'input-field';
                field.innerHTML = `
                    <label>${input.label}</label>
                    <input type="${input.type}" id="${input.name}" value="${input.default}" placeholder="${input.label}">
                `;
                inputGroup.appendChild(field);
            });
            
            // 添加通用字段
            const verifiedField = document.createElement('div');
            verifiedField.className = 'input-field';
            verifiedField.innerHTML = `
                <label>数据已验证</label>
                <input type="checkbox" id="data_verified" checked>
            `;
            inputGroup.appendChild(verifiedField);
        }
        
        // 显示区域
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 自动加载对应数据
            if (sectionId === 'history') {
                loadWarningHistory();
            } else if (sectionId === 'analytics') {
                loadAnalytics();
            } else if (sectionId === 'profile') {
                loadUserProfile();
            }
        }
        
        // 生成预警
        async function generateWarning() {
            const apiUrl = document.getElementById('apiUrl').value;
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const warningResult = document.getElementById('warningResult');
            
            // 收集输入数据
            const inputData = {};
            const inputs = modelInputs[selectedModel] || [{name: "value"}];
            inputs.forEach(input => {
                const element = document.getElementById(input.name);
                if (element) {
                    inputData[input.name] = parseFloat(element.value) || element.value;
                }
            });
            inputData.data_verified = document.getElementById('data_verified').checked;
            inputData.data_time = new Date().toISOString();
            
            // 显示加载状态
            loading.classList.add('show');
            resultSection.style.display = 'none';
            
            try {
                const response = await fetch(`${apiUrl}/api/v1/warning/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: 'web_user',
                        model_id: selectedModel,
                        input_data: inputData
                    })
                });
                
                const result = await response.json();
                
                // 保存到历史记录
                warningHistory.push({
                    warning_time: new Date().toISOString(),
                    warning_level: result.warning_level,
                    warning_type: result.warning_output?.warning_type || models.find(m => m.id === selectedModel)?.name,
                    validation_status: result.validation_status,
                    validation_score: result.validation_score,
                    result: result
                });
                
                // 显示结果
                loading.classList.remove('show');
                resultSection.style.display = 'block';
                
                const levelClass = `level-${result.warning_level}`;
                let html = `<div class="warning-level ${levelClass}">${result.warning_level}级预警</div>`;
                
                if (result.warning_output) {
                    html += `
                        <div class="result-item">
                            <strong>预警说明：</strong>
                            <p>${result.warning_output.explanation || '无'}</p>
                        </div>
                        <div class="result-item">
                            <strong>建议措施：</strong>
                            <p>${result.warning_output.suggestion ? result.warning_output.suggestion.join(', ') : '无'}</p>
                        </div>
                        <div class="result-item">
                            <strong>循证依据：</strong>
                            <p>${result.warning_output.evidence || '无'}</p>
                        </div>
                        <div class="result-item">
                            <strong>验证状态：</strong>
                            <p>${result.validation_status} (评分: ${result.validation_score})</p>
                        </div>
                    `;
                }
                
                warningResult.innerHTML = html;
                
            } catch (error) {
                loading.classList.remove('show');
                warningResult.innerHTML = `<div class="error">API调用失败：${error.message}<br>请确保API服务正在运行，地址为：${apiUrl}</div>`;
                resultSection.style.display = 'block';
            }
        }
        
        // 加载预警历史
        function loadWarningHistory() {
            const historyBody = document.getElementById('historyBody');
            const historyStats = document.getElementById('historyStats');
            
            // 统计数据
            const sCount = warningHistory.filter(w => w.warning_level === 'S').length;
            const aCount = warningHistory.filter(w => w.warning_level === 'A').length;
            const bCount = warningHistory.filter(w => w.warning_level === 'B').length;
            const cCount = warningHistory.filter(w => w.warning_level === 'C').length;
            
            historyStats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number" style="color: #e74c3c;">${sCount}</div>
                    <div class="stat-label">S级预警</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #f39c12;">${aCount}</div>
                    <div class="stat-label">A级预警</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #27ae60;">${bCount}</div>
                    <div class="stat-label">B级预警</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #95a5a6;">${cCount}</div>
                    <div class="stat-label">C级预警</div>
                </div>
            `;
            
            // 表格数据
            if (warningHistory.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #7f8c8d;">暂无预警记录</td></tr>';
                return;
            }
            
            historyBody.innerHTML = warningHistory.map(w => `
                <tr>
                    <td>${w.warning_time.split('T')[0]} ${w.warning_time.split('T')[1]?.split('.')[0] || ''}</td>
                    <td><span class="warning-level level-${w.warning_level}" style="padding: 5px 10px; font-size: 12px;">${w.warning_level}</span></td>
                    <td>${w.warning_type}</td>
                    <td>${w.validation_status}</td>
                    <td>${w.validation_score}</td>
                </tr>
            `).join('');
        }
        
        // 加载数据分析
        function loadAnalytics() {
            // 更新统计数值
            document.getElementById('warningCount').textContent = warningHistory.length;
            
            // 计算平均值（模拟数据）
            if (warningHistory.length > 0) {
                document.getElementById('avgSbp').textContent = '135';
                document.getElementById('avgDbp').textContent = '88';
                document.getElementById('avgGlucose').textContent = '7.2';
            }
            
            // 生成图表
            const chartContainer = document.getElementById('warningChart');
            
            if (warningHistory.length === 0) {
                chartContainer.innerHTML = '<p style="text-align: center; color: #7f8c8d;">暂无数据</p>';
                return;
            }
            
            // 创建饼图
            const canvas = document.createElement('canvas');
            canvas.id = 'pieChart';
            canvas.style.maxWidth = '400px';
            canvas.style.maxHeight = '400px';
            chartContainer.innerHTML = '';
            chartContainer.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['S级', 'A级', 'B级', 'C级'],
                    datasets: [{
                        data: [
                            warningHistory.filter(w => w.warning_level === 'S').length,
                            warningHistory.filter(w => w.warning_level === 'A').length,
                            warningHistory.filter(w => w.warning_level === 'B').length,
                            warningHistory.filter(w => w.warning_level === 'C').length
                        ],
                        backgroundColor: ['#e74c3c', '#f39c12', '#27ae60', '#95a5a6']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        // 加载用户档案
        function loadUserProfile() {
            document.getElementById('profileUserId').textContent = 'web_user';
            
            const sCount = warningHistory.filter(w => w.warning_level === 'S').length;
            const aCount = warningHistory.filter(w => w.warning_level === 'A').length;
            
            document.getElementById('profileHealthStatus').textContent = sCount > 0 ? '高风险' : (aCount > 0 ? '中等风险' : '健康');
            document.getElementById('profileWarningStats').textContent = `共${warningHistory.length}次预警（S级${sCount}次，A级${aCount}次）`;
        }
        
        // 初始化
        initModelSelector();
        updateInputFields();
    </script>
</body>
</html>
